services:
  app:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_ORIGIN: https://schedule.allegedly-media.com
      DATABASE_URL: postgresql://signal_schedule:change_me@postgres:5432/signal_schedule?schema=public
      SESSION_SECRET: change-this-to-a-long-random-secret
      COOKIE_SECURE: "true"
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: signal_schedule
      POSTGRES_USER: signal_schedule
      POSTGRES_PASSWORD: change_me
    volumes:
      - signal_schedule_pgdata:/var/lib/postgresql/data

volumes:
  signal_schedule_pgdata:
